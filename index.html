/* ─── 과학 텍스트 → KaTeX 렌더링 (화학식 + 물리공식 + 생물 + 지구과학) ─── */
function textToLatex(text) {
  if (!text) return text;
  let s = text;

  // ── 화학 반응식 화살표 ──
  s = s.replace(/⇌/g, '\\rightleftharpoons');  // 가역반응 (평형)
  s = s.replace(/←/g, '\\leftarrow');           // 역반응
  s = s.replace(/→/g, '\\rightarrow');          // 정반응
  s = s.replace(/↑/g, '\\uparrow');             // 기체 발생
  s = s.replace(/↓/g, '\\downarrow');           // 침전 생성

  // ── 아래첨자 (화학식): H₂O, CO₂, CH₃COOH 등 ──
  s = s.replace(/₀/g, '_0'); s = s.replace(/₁/g, '_1');
  s = s.replace(/₂/g, '_2'); s = s.replace(/₃/g, '_3');
  s = s.replace(/₄/g, '_4'); s = s.replace(/₅/g, '_5');
  s = s.replace(/₆/g, '_6'); s = s.replace(/₇/g, '_7');
  s = s.replace(/₈/g, '_8'); s = s.replace(/₉/g, '_9');

  // ── 위첨자 (이온 전하 + 지수) ──
  s = s.replace(/⁺/g, '^+');   // Na⁺, H⁺
  s = s.replace(/⁻/g, '^-');   // Cl⁻, OH⁻
  s = s.replace(/⁰/g, '^0');
  s = s.replace(/¹/g, '^1');
  s = s.replace(/²/g, '^2'); s = s.replace(/³/g, '^3');
  s = s.replace(/⁴/g, '^4'); s = s.replace(/⁵/g, '^5');
  s = s.replace(/⁶/g, '^6'); s = s.replace(/⁷/g, '^7');
  s = s.replace(/⁸/g, '^8'); s = s.replace(/⁹/g, '^9');

  // ── 제곱근 ──
  s = s.replace(/√\(([^)]+)\)/g, '\\sqrt{$1}');
  s = s.replace(/√(\d+)/g, '\\sqrt{$1}');
  s = s.replace(/√([a-zA-Z])/g, '\\sqrt{$1}');

  // ── 그리스 문자 (소문자) ──
  s = s.replace(/α/g, '\\alpha');     // 각가속도, α선
  s = s.replace(/β/g, '\\beta');      // β선
  s = s.replace(/γ/g, '\\gamma');     // γ선
  s = s.replace(/δ/g, '\\delta');     // 미소변화
  s = s.replace(/ε/g, '\\epsilon');   // 유전율
  s = s.replace(/η/g, '\\eta');       // 효율
  s = s.replace(/θ/g, '\\theta');     // 각도
  s = s.replace(/λ/g, '\\lambda');    // 파장
  s = s.replace(/μ/g, '\\mu');        // 마찰계수, 마이크로
  s = s.replace(/ν/g, '\\nu');        // 진동수
  s = s.replace(/π/g, '\\pi');        // 원주율
  s = s.replace(/ρ/g, '\\rho');       // 밀도
  s = s.replace(/σ/g, '\\sigma');     // 응력
  s = s.replace(/τ/g, '\\tau');       // 토크, 시간상수
  s = s.replace(/φ/g, '\\varphi');    // 전위, 위상각
  s = s.replace(/ω/g, '\\omega');     // 각속도

  // ── 그리스 문자 (대문자) ──
  s = s.replace(/Γ/g, '\\Gamma');
  s = s.replace(/Δ/g, '\\Delta');     // 변화량 (ΔT, ΔH, ΔG)
  s = s.replace(/Σ/g, '\\Sigma');     // 합
  s = s.replace(/Φ/g, '\\Phi');       // 자기선속
  s = s.replace(/Ω/g, '\\Omega');     // 옴(저항 단위)

  // ── 관계·연산 기호 ──
  s = s.replace(/±/g, '\\pm');
  s = s.replace(/∓/g, '\\mp');
  s = s.replace(/×/g, '\\times');
  s = s.replace(/÷/g, '\\div');
  s = s.replace(/≈/g, '\\approx');
  s = s.replace(/≠/g, '\\neq');
  s = s.replace(/≤/g, '\\leq');
  s = s.replace(/≥/g, '\\geq');
  s = s.replace(/∝/g, '\\propto');    // 비례 (F ∝ 1/r²)
  s = s.replace(/∞/g, '\\infty');

  // ── 기하·물리 기호 ──
  s = s.replace(/∥/g, '\\parallel');  // 평행
  s = s.replace(/⊥/g, '\\perp');      // 수직
  s = s.replace(/°/g, '^{\\circ}');    // 도 (30°, 90°)
  s = s.replace(/∠/g, '\\angle');     // 각도 기호

  // ── 논리·증명 기호 ──
  s = s.replace(/∴/g, '\\therefore'); // 그러므로
  s = s.replace(/∵/g, '\\because');   // 왜냐하면

  // ── 화학 수화물 가운뎃점 (CuSO₄·5H₂O) ──
  s = s.replace(/·/g, '\\cdot');

  // ── 생물 성별 기호 ──
  s = s.replace(/♀/g, '\\text{♀}');   // 암컷
  s = s.replace(/♂/g, '\\text{♂}');   // 수컷

  return s;
}

function MathText({ text }) {
  const ref = useRef(null);
  useEffect(() => {
    if (ref.current && text && typeof katex !== "undefined") {
      try {
        katex.render(textToLatex(text), ref.current, { throwOnError: false, displayMode: false });
      } catch { ref.current.textContent = text; }
    }
  }, [text]);
  if (!text) return null;
  if (typeof katex === "undefined") return <span>{text}</span>;
  return <span ref={ref} />;
}

/* ─── 이미지 압축 (v2 추가) ─── */
function compressImage(file, maxWidth = 1200, quality = 0.75) {
  return new Promise((resolve) => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement("canvas");
      let w = img.width, h = img.height;
      if (w > maxWidth) { h = Math.round(h * maxWidth / w); w = maxWidth; }
      canvas.width = w; canvas.height = h;
      canvas.getContext("2d").drawImage(img, 0, 0, w, h);
      URL.revokeObjectURL(img.src);
      let result = canvas.toDataURL("image/jpeg", quality);
      // Firestore 1MB 한도 안전장치: base64가 700KB 초과 시 재압축
      if (result.length > 700000) {
        result = canvas.toDataURL("image/jpeg", 0.5);
      }
      if (result.length > 700000) {
        // 그래도 크면 해상도도 줄임
        const c2 = document.createElement("canvas");
        c2.width = Math.round(w * 0.6); c2.height = Math.round(h * 0.6);
        c2.getContext("2d").drawImage(canvas, 0, 0, c2.width, c2.height);
        result = c2.toDataURL("image/jpeg", 0.5);
      }
      resolve(result);
    };
    img.onerror = () => { URL.revokeObjectURL(img.src); resolve(null); };
    img.src = URL.createObjectURL(file);
  });
}

/* ─── Firebase config 정리 (v2 버그픽스) ─── */
/* Firebase 콘솔에서 복사한 JavaScript 객체를 JSON으로 변환 */
function cleanFirebaseConfig(raw) {
  let s = raw.trim();
  // "const firebaseConfig = " 등의 접두어 제거
  s = s.replace(/^(?:const|let|var)\s+\w+\s*=\s*/, "");
  // 끝의 세미콜론 제거
  s = s.replace(/;\s*$/, "");
  // JavaScript 객체의 키에 따옴표가 없는 경우 추가 (apiKey → "apiKey")
  s = s.replace(/(\{|,)\s*(\w+)\s*:/g, '$1"$2":');
  // 작은따옴표를 큰따옴표로
  s = s.replace(/'/g, '"');
  // 마지막 쉼표 제거 (trailing comma)
  s = s.replace(/,\s*([\}])/g, '$1');
  return s;
}

/* ─── Anthropic API 호출 (Vercel 프록시 경유) ─── */
async function analyzeWithAI(base64, mimeType) {
  const apiKey = localStorage.getItem("anthropic_api_key");
  if (!apiKey) throw new Error("API 키가 설정되지 않았습니다.\n설정 화면에서 입력해주세요.");

  const res = await fetch("/api/analyze", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ imageBase64: base64, mimeType, apiKey }),
  });

  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.error?.message || "API 호출 실패 (" + res.status + ")");
  }

  const data = await res.json();
  const text = data.content.filter((c) => c.type === "text").map((c) => c.text).join("");
  const clean = text.replace(/```json\s*/g, "").replace(/```\s*/g, "").trim();
  return JSON.parse(clean);
}

/* ─── TTS 헬퍼 (v3: 여성 음성 우선 + 속도 개선) ─── */
function useVoice() {
  const [speaking, setSpeaking] = useState(null);
  const [voices, setVoices] = useState([]);

  useEffect(() => {
    const loadVoices = () => setVoices(window.speechSynthesis.getVoices());
    loadVoices();
    window.speechSynthesis.addEventListener("voiceschanged", loadVoices);
    return () => {
      window.speechSynthesis.removeEventListener("voiceschanged", loadVoices);
      window.speechSynthesis.cancel();
    };
  }, []);

  /* 한국어 여성 음성 우선 선택 (Google 한국의 최우선) */
  const pickKoFemale = useCallback((voiceList) => {
    const ko = voiceList.filter((v) => v.lang.startsWith("ko"));
    if (ko.length === 0) return null;
    // 1순위: Google 한국어 음성 (가장 자연스러움)
    const google = ko.find((v) => v.name.toLowerCase().includes("google"));
    if (google) return google;
    // 2순위: 여성 음성 키워드 (플랫폼별)
    const femaleHints = ["yuna","sora","sunhi","heami","jiyeon","minji","seoyeon","heera","female"];
    const female = ko.find((v) => {
      const n = (v.name + " " + (v.voiceURI || "")).toLowerCase();
      return femaleHints.some((h) => n.includes(h));
    });
    if (female) return female;
    // 3순위: 남성 키워드 제외한 음성
    const maleHints = ["jihun","junwoo","male","hyunbin"];
    const notMale = ko.find((v) => {
      const n = (v.name + " " + (v.voiceURI || "")).toLowerCase();
      return !maleHints.some((h) => n.includes(h));
    });
    return notMale || ko[0];
  }, []);

  const speak = useCallback((text, id) => {
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = "ko-KR"; u.rate = 1.1;
    const picked = pickKoFemale(voices);
    if (picked) u.voice = picked;
    u.onstart = () => setSpeaking(id);
    u.onend = () => setSpeaking(null);
    u.onerror = () => setSpeaking(null);
    window.speechSynthesis.speak(u);
  }, [voices, pickKoFemale]);

  const stop = useCallback(() => { window.speechSynthesis.cancel(); setSpeaking(null); }, []);
  return { speaking, speak, stop };
}

/* ─── PIN 잠금 화면 ─── */
function PinLock({ onUnlock }) {
  const [pin, setPin] = useState("");
  const [error, setError] = useState(false);
  const [shake, setShake] = useState(false);

  const handleDigit = (d) => {
    if (pin.length >= 4) return;
    const next = pin + d;
    setPin(next);
    setError(false);
    if (next.length === 4) {
      const stored = localStorage.getItem("app_pin");
      if (next === stored) {
        sessionStorage.setItem("pin_unlocked", "1");
        onUnlock();
      } else {
        setShake(true);
        setError(true);
        setTimeout(() => { setPin(""); setShake(false); }, 500);
      }
    }
  };

  const handleDelete = () => { setPin((p) => p.slice(0, -1)); setError(false); };

  const dots = [0, 1, 2, 3].map((i) => (
    <div key={i} className={"w-4 h-4 rounded-full border-2 transition-all duration-200 " +
      (i < pin.length ? "bg-indigo-500 border-indigo-500 scale-110" : "border-slate-300")} />
  ));

  const numpad = [
    [1, 2, 3],
    [4, 5, 6],
    [7, 8, 9],
    [null, 0, "del"],
  ];

  return (
    <div className="min-h-screen bg-gradient-to-br from-slate-50 to-indigo-50 flex flex-col items-center justify-center px-6"
      style={{ fontFamily: "-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" }}>
      <style>{`
        @keyframes pinShake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-8px)}40%,80%{transform:translateX(8px)}}
        .pin-shake{animation:pinShake 0.4s ease-out}
      `}</style>
      <div className="text-5xl mb-4">🔬</div>
      <h1 className="text-lg font-bold text-slate-800 mb-1">HW 과학 오답노트 byYHS</h1>
      <p className="text-sm text-slate-500 mb-8">비밀번호를 입력하세요</p>
      <div className={"flex gap-4 mb-3 " + (shake ? "pin-shake" : "")}>{dots}</div>
      {error && <div className="text-xs text-red-500 font-semibold mb-2">비밀번호가 틀렸습니다</div>}
      {!error && <div className="h-5 mb-2" />}
      <div className="grid grid-cols-3 gap-3 w-64">
        {numpad.flat().map((k, i) => {
          if (k === null) return <div key={i} />;
          if (k === "del") return (
            <button key={i} onClick={handleDelete}
              className="w-full h-14 rounded-2xl bg-white border border-slate-200 flex items-center justify-center text-slate-500 hover:bg-slate-100 active:bg-slate-200 transition-colors shadow-sm">
              ⌫
            </button>
          );
          return (
            <button key={i} onClick={() => handleDigit(String(k))}
              className="w-full h-14 rounded-2xl bg-white border border-slate-200 text-xl font-semibold text-slate-800 hover:bg-indigo-50 active:bg-indigo-100 transition-colors shadow-sm">
              {k}
            </button>
          );
        })}
      </div>
    </div>
  );
}

/* ─── 투명 필기 캔버스 ─── */
function DrawCanvas({ onClose }) {
  const canvasRef = useRef(null);
  const [drawing, setDrawing] = useState(false);
  const [color, setColor] = useState("#1e293b");
  const [lineW, setLineW] = useState(3);
  const [tool, setTool] = useState("pen"); // pen | eraser | scroll
  const lastPos = useRef(null);

  const isScroll = tool === "scroll";

  useEffect(() => {
    const c = canvasRef.current;
    if (!c) return;
    const resize = () => {
      const oldData = c.width > 0 && c.height > 0 ? c.getContext("2d").getImageData(0, 0, c.width, c.height) : null;
      c.width = window.innerWidth;
      c.height = Math.max(document.documentElement.scrollHeight, window.innerHeight);
      if (oldData) c.getContext("2d").putImageData(oldData, 0, 0);
    };
    resize();
    window.addEventListener("resize", resize);
    return () => window.removeEventListener("resize", resize);
  }, []);

  /* 스크롤 모드 전환 시 body overflow 제어 */
  useEffect(() => {
    if (isScroll) {
      document.body.style.overflow = "";
    } else {
      document.body.style.overflow = "hidden";
    }
    return () => { document.body.style.overflow = ""; };
  }, [isScroll]);

  const getPos = (e) => {
    const t = e.touches ? e.touches[0] : e;
    return { x: t.pageX, y: t.pageY };
  };

  const startDraw = (e) => {
    if (isScroll) return;
    e.preventDefault();
    setDrawing(true);
    lastPos.current = getPos(e);
  };

  const draw = (e) => {
    if (!drawing || isScroll) return;
    e.preventDefault();
    const c = canvasRef.current;
    const ctx = c.getContext("2d");
    const pos = getPos(e);
    const prev = lastPos.current;

    ctx.beginPath();
    ctx.moveTo(prev.x, prev.y);
    ctx.lineTo(pos.x, pos.y);
    if (tool === "eraser") {
      ctx.globalCompositeOperation = "destination-out";
      ctx.lineWidth = lineW * 8;
    } else {
      ctx.globalCompositeOperation = "source-over";
      ctx.strokeStyle = color;
      ctx.lineWidth = lineW;
    }
    ctx.lineCap = "round";
    ctx.lineJoin = "round";
    ctx.stroke();
    lastPos.current = pos;
  };

  const endDraw = () => { setDrawing(false); lastPos.current = null; };

  const clearAll = () => {
    const c = canvasRef.current;
    const ctx = c.getContext("2d");
    ctx.clearRect(0, 0, c.width, c.height);
  };

  const colors = [
    { c: "#1e293b", n: "검정" },
    { c: "#dc2626", n: "빨강" },
    { c: "#2563eb", n: "파랑" },
    { c: "#16a34a", n: "초록" },
  ];

  return (
    <>
      {/* 도구 바 (항상 상단 고정) */}
      <div className="fixed top-0 left-0 right-0 z-[60] bg-white/95 backdrop-blur-sm border-b border-slate-200 shadow-md px-3 py-2">
        <div className="flex items-center justify-between gap-2 max-w-3xl mx-auto">
          <div className="flex items-center gap-1.5 flex-wrap">
            <button onClick={() => setTool("pen")}
              className={"px-2.5 py-1.5 rounded-lg text-xs font-semibold transition-colors " + (tool === "pen" ? "bg-indigo-600 text-white" : "bg-slate-100 text-slate-600")}>
              ✏️ 펜
            </button>
            <button onClick={() => setTool("eraser")}
              className={"px-2.5 py-1.5 rounded-lg text-xs font-semibold transition-colors " + (tool === "eraser" ? "bg-indigo-600 text-white" : "bg-slate-100 text-slate-600")}>
              🧽 지우개
            </button>
            <button onClick={() => setTool("scroll")}
              className={"px-2.5 py-1.5 rounded-lg text-xs font-semibold transition-colors " + (isScroll ? "bg-amber-500 text-white" : "bg-slate-100 text-slate-600")}>
              ✋ 스크롤
            </button>
            {tool === "pen" && colors.map((co) => (
              <button key={co.c} onClick={() => setColor(co.c)} title={co.n}
                className={"w-7 h-7 rounded-full border-2 transition-transform " + (color === co.c ? "scale-110 border-indigo-500 shadow-md" : "border-slate-300")}
                style={{ background: co.c }} />
            ))}
            {(tool === "pen" || tool === "eraser") && (
              <select value={lineW} onChange={(e) => setLineW(Number(e.target.value))}
                className="text-xs px-1.5 py-1 rounded-lg border border-slate-300 bg-white">
                <option value={2}>가늘게</option>
                <option value={3}>보통</option>
                <option value={5}>굵게</option>
                <option value={8}>매우 굵게</option>
              </select>
            )}
          </div>
          <div className="flex items-center gap-1.5">
            <button onClick={clearAll} className="px-2.5 py-1.5 rounded-lg text-xs font-semibold bg-red-50 text-red-600 hover:bg-red-100">
              지우기
            </button>
            <button onClick={onClose} className="px-2.5 py-1.5 rounded-lg text-xs font-semibold bg-slate-800 text-white hover:bg-slate-700">
              ✕ 닫기
            </button>
          </div>
        </div>
        {isScroll && (
          <div className="text-center text-[11px] text-amber-600 font-semibold mt-1">
            스크롤 모드 — 화면을 움직여 필기 공간을 확보하세요
          </div>
        )}
      </div>

      {/* 투명 캔버스 (페이지 전체 크기) */}
      <canvas ref={canvasRef}
        className="absolute top-0 left-0 z-50"
        style={{
          touchAction: isScroll ? "auto" : "none",
          pointerEvents: isScroll ? "none" : "auto",
          cursor: isScroll ? "default" : "crosshair",
        }}
        onPointerDown={startDraw}
        onPointerMove={draw}
        onPointerUp={endDraw}
        onPointerLeave={endDraw}
        onPointerCancel={endDraw} />
    </>
  );
}

/* ─── 업로드 (v2: 실제 AI 분석 + 이미지 압축) ─── */
function UploadView({ onSave, onCancel }) {

    mountedRef.current = true;
    return () => { mountedRef.current = false; abortRef.current = true; if (imgUrlRef.current) URL.revokeObjectURL(imgUrlRef.current); };
  }, []);

  const setImgSafe = (url) => {
    if (imgUrlRef.current) URL.revokeObjectURL(imgUrlRef.current);
    imgUrlRef.current = url;
    setImg(url);
    if (!url) setImgFile(null);
  };

    const f = e.target.files && e.target.files[0];
    if (f) { setImgFile(f); setImgSafe(URL.createObjectURL(f)); }
    e.target.value = "";
  };

  const handlePaste = (e) => {
    const items = Array.from(e.clipboardData.items || []);
    const found = items.find((i) => i.type.startsWith("image/"));
    if (!found) return;
    e.preventDefault();
    const file = found.getAsFile();
    if (file) { setImgFile(file); setImgSafe(URL.createObjectURL(file)); }

  const handleCancel = () => { abortRef.current = true; onCancel(); };

      // 2) base64 추출
      const base64 = compressed.split(",")[1];
      const mimeType = "image/jpeg";

      // 3) AI 분석
      if (mountedRef.current) setStatus("AI가 문제를 분석하고 있습니다...");
      const result = await analyzeWithAI(base64, mimeType);
      if (abortRef.current || !mountedRef.current) { if (mountedRef.current) { setLoading(false); setStatus(""); } return; }

      // 4) 문제 객체 생성
      if (mountedRef.current) setStatus("저장 중...");

        </div>
      )}

      {(mode !== "review" || showSol) && problem.solutionSteps && (
        <div className="bg-white rounded-2xl p-4 shadow-sm border border-slate-200">
          <div className="flex items-center gap-2 mb-3"><Ic n="pen" sz={15} cls="text-emerald-600" /><span className="font-semibold">올바른 풀이</span></div>
          <StepByStep key={problem.id} steps={problem.solutionSteps} errorStep={problem.errorStep} onReanalyze={handleReanalyze} reanalyzing={reanalyzing} finalAnswer={problem.finalAnswer} />

      )}

      {/* 재분석 에러 */}
      {reError && (
        <div className="bg-red-50 border border-red-200 rounded-2xl p-3 text-sm flex items-center justify-between">
          <div className="text-red-700 flex items-center gap-2">⚠️ {reError}</div>

      {reResult && (
        <div className="bg-white rounded-2xl shadow-sm border-2 border-indigo-300 overflow-hidden">
          {/* 헤더: 정답 비교 요약 */}

            <div className="flex items-center gap-2 mb-2">
              <span className="text-lg">{isSameAnswer ? "✅" : "⚠️"}</span>
              <span className={"font-bold text-sm " + (isSameAnswer ? "text-emerald-800" : "text-amber-800")}>
                {isSameAnswer ? "기존 풀이와 동일한 정답입니다" : "기존 풀이와 다른 정답입니다"}
              </span>
            </div>
            <div className="grid grid-cols-2 gap-2 text-xs">
              <div className="px-3 py-2 bg-white rounded-lg border overflow-hidden">
                <div className="text-slate-500 mb-1">기존 정답</div>
                <div className="font-bold text-slate-800 break-words"><MathText text={oldAnswer} /></div>
              </div>
              <div className="px-3 py-2 bg-white rounded-lg border overflow-hidden">
                <div className="text-slate-500 mb-1">새 정답</div>
                <div className="font-bold text-indigo-700 break-words"><MathText text={newAnswer} /></div>
              </div>
            </div>
          </div>

          {/* 탭 전환: 기존 풀이 / 새 풀이 */}
          <div className="flex border-b">
            <button onClick={() => setReTab("old")}
              className={"flex-1 py-2.5 text-sm font-semibold transition-colors " + (reTab === "old" ? "text-slate-800 border-b-2 border-slate-600 bg-slate-50" : "text-slate-400 hover:text-slate-600 hover:bg-slate-50")}>
              📋 기존 풀이
            </button>
            <button onClick={() => setReTab("new")}
              className={"flex-1 py-2.5 text-sm font-semibold transition-colors " + (reTab === "new" ? "text-indigo-700 border-b-2 border-indigo-600 bg-indigo-50" : "text-slate-400 hover:text-indigo-500 hover:bg-indigo-50")}>

            </button>
          </div>

          {/* 탭 내용 */}
          <div className="p-4">
            {reTab === "old" ? (
              <div className="space-y-2">
                {(problem.solutionSteps || []).map((s) => (
                  <div key={s.num} className="flex gap-2 text-sm">
                    <span className="w-6 h-6 rounded-full bg-slate-500 text-white flex items-center justify-center text-xs font-bold flex-shrink-0">{s.num}</span>
                    <div className="flex-1">
                      <div className="font-semibold text-slate-700">{s.title}</div>
                      {s.math && <div className="text-xs font-mono text-slate-600 mt-0.5"><MathText text={s.math} /></div>}
                      {s.explain && <div className="text-xs text-slate-500 mt-0.5">{s.explain}</div>}
                    </div>
                  </div>
                ))}
              </div>
            ) : (
              <div className="space-y-2">
                {(reResult.solutionSteps || []).map((s) => (
                  <div key={s.num} className="flex gap-2 text-sm">
                    <span className="w-6 h-6 rounded-full bg-indigo-600 text-white flex items-center justify-center text-xs font-bold flex-shrink-0">{s.num}</span>
                    <div className="flex-1">
                      <div className="font-semibold text-indigo-800">{s.title}</div>
                      {s.math && <div className="text-xs font-mono text-indigo-700 mt-0.5"><MathText text={s.math} /></div>}
                      {s.explain && <div className="text-xs text-slate-600 mt-0.5">{s.explain}</div>}

                ))}

            )}
          </div>

          {/* 액션 버튼 */}
          <div className="px-4 pb-4 flex gap-2">
            <button onClick={applyNewResult}
              className="flex-1 py-2.5 rounded-xl bg-gradient-to-r from-indigo-600 to-purple-600 text-white font-semibold text-sm active:scale-[0.98] transition-transform flex items-center justify-center gap-1.5">
              ✨ 새 풀이로 교체
            </button>
            <button onClick={() => { setReResult(null); setReError(""); }}
              className="flex-1 py-2.5 rounded-xl bg-slate-100 hover:bg-slate-200 text-slate-700 font-semibold text-sm transition-colors flex items-center justify-center gap-1.5">
              기존 유지
            </button>
          </div>
        </div>

      {(problem.keyConcepts || []).length > 0 && (
        <div className="bg-white rounded-2xl p-4 shadow-sm border border-slate-200">
          <div className="flex items-center gap-2 mb-2"><Ic n="star" sz={15} cls="text-purple-600" /><span className="font-semibold">핵심 개념</span></div>
          <ul className="space-y-1 text-sm text-slate-700">
            {problem.keyConcepts.map((c, i) => <li key={i} className="flex items-start gap-2"><span className="text-purple-500">▸</span>{c}</li>)}
          </ul>
        </div>

      {(problem.keyFormulas || []).length > 0 && (
        <div className="bg-gradient-to-br from-indigo-50 to-blue-50 rounded-2xl p-4 shadow-sm border-2 border-indigo-200">

            <span className="text-lg">🔬</span>
            <span className="font-bold text-indigo-800">핵심 공식/법칙</span>
            <span className="text-[10px] px-2 py-0.5 bg-indigo-200 text-indigo-800 rounded-full font-semibold">꼭 암기!</span>
          </div>
          <div className="space-y-2">
            {problem.keyFormulas.map((f, i) => (
              <div key={i} className="px-4 py-3 bg-white border border-indigo-200 rounded-xl shadow-sm">

        <div className="bg-gradient-to-r from-amber-50 to-yellow-50 rounded-2xl p-4 border border-amber-200 flex items-start gap-2">
          <div className="text-xl">💡</div>
          <div>
            <div className="font-semibold text-amber-900 mb-1 text-sm">선생님의 팁</div>
            <div className="text-sm text-amber-800">{problem.tip}</div>
          </div>
        </div>
      )}

      <div className="bg-white rounded-2xl p-4 shadow-sm border border-slate-200">
        <div className="flex items-center gap-2 mb-2">
          <Ic n="edit" sz={14} cls="text-slate-600" /><span className="font-semibold">나의 메모</span>
          {saved && <span className="ml-auto text-xs text-emerald-600 font-semibold flex items-center gap-1 transition-all"><Ic n="chk" sz={12} /> 저장됨!</span>}
        </div>
        <textarea value={notes} onChange={(e) => setNotes(e.target.value)} rows={3}
          placeholder="이 문제에 대한 나만의 메모를 적어보세요"
          className="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none text-sm mb-2" />
        <div className="flex gap-2">
          <button onClick={saveNotes}
            className={"flex-1 py-2 rounded-lg text-sm font-semibold flex items-center justify-center gap-1 transition-all " + (saved ? "bg-emerald-500 text-white" : "bg-indigo-600 text-white")}>
            <Ic n={saved ? "chk" : "save"} sz={12} /> {saved ? "저장 완료!" : "저장"}
          </button>
          <button onClick={() => setNotes(problem.notes || "")} className="flex-1 py-2 rounded-lg bg-slate-100 text-sm">취소</button>
        </div>
      </div>

      {/* 유사 문제 에러 */}
      {simError && (
        <div className="bg-red-50 border border-red-200 rounded-2xl p-3 text-sm flex items-center justify-between">
          <span className="text-red-700">⚠️ {simError}</span>
          <button onClick={() => setSimError("")} className="text-xs text-red-500 px-2 py-1 rounded hover:bg-red-100">닫기</button>
        </div>
      )}

      {/* 유사 문제 로딩 */}
      {simLoading && (
        <div className="bg-purple-50 border border-purple-200 rounded-2xl p-4 flex items-center gap-3">
          <span className="animate-spin text-lg">⟳</span>
          <div>
            <div className="font-semibold text-purple-700 text-sm">유사 문제 생성 중...</div>
            <div className="text-xs text-purple-500">AI가 비슷한 유형의 문제 1개를 만들고 있습니다 (10~20초)</div>
          </div>
        </div>
      )}

      {/* 유사 문제 표시 */}
      {simProblems && simProblems.map((sp, idx) => (
        <div key={idx} className="bg-white rounded-2xl shadow-sm border-2 border-purple-200 overflow-hidden">
          <div className="px-4 py-3 bg-gradient-to-r from-purple-50 to-indigo-50 border-b border-purple-200">
            <div className="flex items-center justify-between">
              <div className="flex items-center gap-2">
                <span className="w-6 h-6 rounded-full bg-purple-600 text-white flex items-center justify-center text-xs font-bold">{idx + 1}</span>
                <span className="font-bold text-sm text-purple-800">{sp.title || ("유사 문제 " + (idx + 1))}</span>
              </div>
              {sp.difficulty && <span className={"text-[10px] px-2 py-0.5 rounded-full font-semibold " + (sp.difficulty === "상" ? "bg-red-100 text-red-700" : sp.difficulty === "중" ? "bg-amber-100 text-amber-700" : "bg-emerald-100 text-emerald-700")}>난이도 {sp.difficulty}</span>}
            </div>
          </div>

          <div className="p-4 space-y-3">
            {/* 문제 텍스트 */}
            <div className="p-3 bg-slate-50 rounded-xl border border-slate-200">
              <div className="text-sm text-slate-800 leading-relaxed whitespace-pre-wrap break-words">{sp.problemText || ""}</div>
            </div>

            {/* 풀어보기 + 정답 확인 버튼 */}
            <div className="flex gap-2">
              <button onClick={() => setSimDrawIdx(simDrawIdx === idx ? null : idx)}
                className={"flex-1 py-2.5 rounded-xl font-semibold text-sm flex items-center justify-center gap-1.5 transition-colors " +
                  (simDrawIdx === idx ? "bg-amber-500 text-white" : "bg-white border-2 border-amber-300 text-amber-700 hover:bg-amber-50")}>
                {simDrawIdx === idx ? "✏️ 필기 중..." : "✏️ 풀어보기"}
              </button>
              {!simRevealed[idx] ? (
                <button onClick={() => setSimRevealed((p) => ({ ...p, [idx]: true }))}
                  className="flex-1 py-2.5 rounded-xl bg-white border-2 border-emerald-300 text-emerald-700 font-semibold text-sm hover:bg-emerald-50 flex items-center justify-center gap-1.5">
                  <Ic n="eye" sz={14} /> 정답 확인
                </button>
              ) : simSaved[idx] ? (
                <div className="flex-1 py-2.5 rounded-xl bg-emerald-100 text-emerald-700 font-semibold text-sm flex items-center justify-center gap-1.5">
                  ✅ 저장 완료
                </div>
              ) : (
                <button onClick={() => handleSaveSimilar(sp, idx)}
                  className="flex-1 py-2.5 rounded-xl bg-white border-2 border-indigo-300 text-indigo-700 font-semibold text-sm hover:bg-indigo-50 flex items-center justify-center gap-1.5">
                  💾 라이브러리 저장
                </button>
              )}
            </div>

            {/* 정답/풀이 (접힘) */}
            {simRevealed[idx] && (
              <div className="space-y-2 pt-2 border-t border-slate-200">
                {/* 재분석 비교 UI */}
                {simReIdx === idx && simReResult && (() => {
                  const oldA = sp.finalAnswer || (sp.solutionSteps && sp.solutionSteps.length > 0 ? sp.solutionSteps[sp.solutionSteps.length - 1].math : "") || "";
                  const newA = simReResult.finalAnswer || (simReResult.solutionSteps && simReResult.solutionSteps.length > 0 ? simReResult.solutionSteps[simReResult.solutionSteps.length - 1].math : "") || "";
                  const same = oldA === newA;
                  return (
                  <div className="bg-white rounded-2xl shadow-sm border-2 border-indigo-300 overflow-hidden mb-3">
                    <div className={"px-4 py-3 " + (same ? "bg-emerald-50 border-b border-emerald-200" : "bg-amber-50 border-b border-amber-200")}>
                      <div className="flex items-center gap-2 mb-2">
                        <span className="text-lg">{same ? "✅" : "⚠️"}</span>
                        <span className={"font-bold text-sm " + (same ? "text-emerald-800" : "text-amber-800")}>
                          {same ? "기존 풀이와 동일한 정답입니다" : "기존 풀이와 다른 정답입니다"}
                        </span>
                      </div>
                      <div className="grid grid-cols-2 gap-2 text-xs">
                        <div className="px-3 py-2 bg-white rounded-lg border overflow-hidden">
                          <div className="text-slate-500 mb-1">기존 정답</div>
                          <div className="font-bold text-slate-800 break-words"><MathText text={oldA} /></div>
                        </div>
                        <div className="px-3 py-2 bg-white rounded-lg border overflow-hidden">
                          <div className="text-slate-500 mb-1">새 정답</div>
                          <div className="font-bold text-indigo-700 break-words"><MathText text={newA} /></div>
                        </div>
                      </div>
                    </div>
                    <div className="flex border-b">
                      <button onClick={() => setSimReTab("old")}
                        className={"flex-1 py-2.5 text-sm font-semibold transition-colors " + (simReTab === "old" ? "text-slate-800 border-b-2 border-slate-600 bg-slate-50" : "text-slate-400 hover:text-slate-600")}>
                        📋 기존 풀이
                      </button>
                      <button onClick={() => setSimReTab("new")}
                        className={"flex-1 py-2.5 text-sm font-semibold transition-colors " + (simReTab === "new" ? "text-indigo-700 border-b-2 border-indigo-600 bg-indigo-50" : "text-slate-400 hover:text-slate-600")}>
                        ✨ 새 풀이
                      </button>
                    </div>
                    <div className="p-4">
                      {simReTab === "old"
                        ? <StepByStep steps={sp.solutionSteps || []} errorStep={null} finalAnswer={sp.finalAnswer} />
                        : <StepByStep steps={simReResult.solutionSteps || []} errorStep={null} finalAnswer={simReResult.finalAnswer} />
                      }
                    </div>
                    <div className="flex gap-2 p-4 pt-0">
                      <button onClick={() => applySimReResult(idx)} className="flex-1 py-2.5 rounded-xl bg-indigo-600 text-white font-semibold text-sm hover:bg-indigo-700 transition">새 풀이로 교체</button>
                      <button onClick={() => { setSimReResult(null); setSimReIdx(null); }} className="flex-1 py-2.5 rounded-xl bg-slate-200 text-slate-700 font-semibold text-sm hover:bg-slate-300 transition">기존 유지</button>
                    </div>
                  </div>
                  );
                })()}
                {/* 일반 StepByStep (재분석 비교 UI가 없을 때) */}
                {!(simReIdx === idx && simReResult) && (
                  <StepByStep steps={sp.solutionSteps || []} errorStep={null} finalAnswer={sp.finalAnswer}
                    onReanalyze={() => handleSimReanalyze(idx)} reanalyzing={simReIdx === idx && !simReResult} />
                )}
              </div>
            )}
          </div>
        </div>
      ))}

      {/* 투명 필기 캔버스 */}
      {(drawMode || simDrawIdx !== null) && <DrawCanvas onClose={() => { setDrawMode(false); setSimDrawIdx(null); }} />}
    </div>
  );
}

    <button onClick={onClick} className="w-full bg-white rounded-2xl p-3 shadow-sm border border-slate-200 hover:shadow-md hover:border-indigo-300 transition text-left group">
      <div className="flex gap-3">
        <div className="w-20 h-20 flex-shrink-0 rounded-lg overflow-hidden bg-slate-100 border border-slate-200 flex items-center justify-center">
          {p.problemImg && p.type !== "similar"
            ? <img src={p.problemImg} alt={p.title} className="w-full h-full object-cover" onError={(e) => { e.target.style.display = 'none'; }} />
            : <span className="text-2xl">{p.type === "similar" ? "🎲" : "🔬"}</span>
          }
        </div>
        <div className="flex-1 min-w-0">
          <div className="flex items-start gap-1">
            <h3 className="font-semibold text-slate-800 text-sm group-hover:text-indigo-600 line-clamp-2">{p.title}</h3>
            <span className="flex-shrink-0">{p.type === "similar" && "🎲"}{p.bookmarked && "🔖"}{p.mastered && "✅"}</span>
          </div>
          <div className="flex flex-wrap gap-1 mt-1.5">
            {p.type === "similar" && <span className="text-[10px] px-1.5 py-0.5 rounded bg-purple-100 text-purple-700 font-medium">유사</span>}
            {p.grade && <span className="text-[10px] px-1.5 py-0.5 rounded bg-indigo-100 text-indigo-700 font-medium">{p.grade}</span>}

          <div className="flex justify-between mt-1.5 text-[11px] text-slate-500">
            <span>{date}</span>
            {p.reviewCount > 0 && <span>복습 {p.reviewCount}회</span>}
          </div>
        </div>
      </div>
    </button>
  );
}

function Library({ problems, onSelect }) {
  const [q, setQ] = useState("");
  const [fG, setFG] = useState("all");
  const [fU, setFU] = useState("all");
  const [fT, setFT] = useState("all");
  const [printMode, setPrintMode] = useState(false);
  const [printStyle, setPrintStyle] = useState("large"); // "large" (디폴트) | "compact"

  const grades = useMemo(() => ["all", ...new Set(problems.map((p) => p.grade).filter(Boolean))], [problems]);
  const units = useMemo(() => ["all", ...new Set(problems.map((p) => p.unit).filter(Boolean))], [problems]);
  const list = useMemo(() => {
    return problems.filter((p) => {
      if (fG !== "all" && p.grade !== fG) return false;
      if (fU !== "all" && p.unit !== fU) return false;
      if (fT === "bookmark" && !p.bookmarked) return false;
      if (fT === "unmastered" && p.mastered) return false;
      if (fT === "mastered" && !p.mastered) return false;
      if (fT === "similar" && p.type !== "similar") return false;
      if (fT === "original" && p.type === "similar") return false;
      if (q) {
        const h = [p.title, p.unit, p.problemText, ...(p.tags || [])].join(" ").toLowerCase();
        if (!h.includes(q.toLowerCase())) return false;
      }
      return true;
    }).sort((a, b) => b.createdAt - a.createdAt);
  }, [problems, q, fG, fU, fT]);

  const doPrint = () => { setTimeout(() => window.print(), 400); };


  if (printMode) {
    const isLarge = printStyle === "large";
    return (
      <div className="max-w-3xl mx-auto p-6 print-area" style={{background:"#fff",color:"#1e293b"}}>
        {/* 인쇄 옵션 바 (화면에서만 보임, 인쇄 시 숨김) */}
        <div className="np mb-6 p-4 bg-slate-50 rounded-2xl border border-slate-200 space-y-3">
          <div className="flex items-center justify-between">
            <button onClick={() => setPrintMode(false)} className="text-sm flex items-center gap-1 hover:underline" style={{color:"#4f46e5"}}><Ic n="cl" sz={14} /> 돌아가기</button>
            <button onClick={doPrint} className="px-5 py-2 bg-gradient-to-r from-indigo-600 to-purple-600 text-white rounded-xl font-semibold text-sm shadow-md active:scale-[0.98] transition-transform flex items-center gap-2">
              <Ic n="print" sz={16} cls="text-white" /> 출력하기
            </button>
          </div>
          <div className="flex items-center gap-2">
            <span className="text-xs font-semibold text-slate-600">출력 스타일:</span>
            <button onClick={() => setPrintStyle("large")}
              className={"px-3 py-1.5 rounded-lg text-xs font-semibold transition-colors " + (isLarge ? "bg-indigo-600 text-white" : "bg-white border border-slate-300 text-slate-600 hover:bg-slate-100")}>
              🖼 큰 이미지 (1문제/쪽)
            </button>
            <button onClick={() => setPrintStyle("compact")}
              className={"px-3 py-1.5 rounded-lg text-xs font-semibold transition-colors " + (!isLarge ? "bg-indigo-600 text-white" : "bg-white border border-slate-300 text-slate-600 hover:bg-slate-100")}>
              📄 간결 (여러문제/쪽)
            </button>
          </div>
          <div className="text-[11px] text-slate-500">
            {isLarge ? "💡 문제 이미지를 크게 출력합니다. 그래프·도표가 선명하게 보입니다." : "💡 여러 문제를 한 페이지에 모아 출력합니다."}
          </div>
        </div>

        {/* 헤더 */}
        <div className="text-center mb-8 border-b-2 pb-6">
          <div className="text-3xl mb-2">🔬</div>
          <h1 className="text-2xl font-bold" style={{color:"#1e293b"}}>HW 과학 오답노트 byYHS</h1>
          <p className="text-sm mt-2" style={{color:"#64748b"}}>{fG !== "all" ? fG : "모든 학년"} · {fU !== "all" ? fU : "모든 단원"} · {list.length}문제 · {new Date().toLocaleDateString("ko-KR")}</p>
        </div>

        {/* 문제 목록 */}
        {list.map((p, idx) => (
          <div key={p.id}
            style={isLarge ? { pageBreakAfter: idx < list.length - 1 ? "always" : "auto" } : { pageBreakInside: "avoid" }}
            className={isLarge ? "mb-6" : "mb-8 border-b pb-6"}>
            <h2 className={isLarge ? "text-xl font-bold mb-3" : "text-lg font-bold mb-2"} style={{color:"#1e293b"}}>{idx + 1}. {p.title}</h2>
            <div className="flex flex-wrap gap-1 mb-2 text-xs">
              {p.grade && <span className="px-2 py-0.5 rounded" style={{background:"#e0e7ff",color:"#4f46e5"}}>{p.grade}</span>}
              {p.unit && <span className="px-2 py-0.5 rounded" style={{background:"#f3e8ff",color:"#7c3aed"}}>{p.unit}</span>}
              {p.difficulty && <span className="px-2 py-0.5 rounded" style={{background:"#f1f5f9"}}>난이도 {p.difficulty}</span>}
            </div>
            {/* 이미지: large 모드에서는 높이 제한 없이 최대 크기로 출력 (유사문제는 이미지 없음) */}
            {p.problemImg && p.type !== "similar" && <img src={p.problemImg} alt={p.title}
              className={"w-full object-contain border rounded-xl mb-3" + (isLarge ? "" : " max-h-72")}
              style={isLarge ? { maxHeight: "50vh" } : {}}
              onError={(e) => { e.target.style.display="none"; }} />}
            {p.problemText && <p className={isLarge ? "text-sm italic mb-3" : "text-sm italic mb-2"} style={{color:"#475569"}}>{p.problemText}</p>}
            {p.errorAnalysis && (
              <div className="p-3 border-2 rounded-xl mb-3 text-sm" style={{borderColor:"#fca5a5",background:"#fef2f2",color:"#991b1b"}}>
                ⚠ 오류{p.errorStep ? " ("+p.errorStep+"단계)" : ""}: {p.errorAnalysis}
              </div>
            )}
            {p.solutionSteps && p.solutionSteps.map((s) => (
              <div key={s.num} className={"flex gap-2 mb-2 text-sm" + (p.errorStep === s.num ? " pl-2 border-l-2" : "")} style={p.errorStep === s.num ? {borderColor:"#f87171"} : {}}>
                <span className="font-bold" style={{color:"#4f46e5"}}>{s.num}.</span>
                <div><strong>{s.title}</strong>{s.math && <span className="font-mono text-xs ml-1"><MathText text={s.math} /></span>}<div className="text-xs" style={{color:"#64748b"}}>{s.explain}</div></div>
              </div>
            ))}
            {(p.keyFormulas || []).length > 0 && (
              <div className="mt-2 p-3 rounded-xl" style={{background:"#eef2ff"}}>
                <div className="font-bold text-sm mb-1" style={{color:"#312e81"}}>🔬 핵심 공식/법칙</div>
                {p.keyFormulas.map((f, i) => <div key={i} className="font-mono text-xs" style={{color:"#312e81"}}><MathText text={f} /></div>)}
              </div>
            )}
            {p.tip && <div className="mt-2 p-2 rounded-lg text-xs" style={{background:"#fffbeb",color:"#92400e"}}>💡 {p.tip}</div>}
            {p.notes && <div className="mt-2 p-2 rounded-lg text-xs" style={{background:"#f8fafc",color:"#475569"}}>📝 {p.notes}</div>}
          </div>
        ))}
        <div className="text-center text-xs pt-4 np" style={{color:"#94a3b8"}}>총 {list.length}문제 · {new Date().toLocaleDateString("ko-KR")} 출력</div>
      </div>
    );
  }

  return (
    <div className="max-w-3xl mx-auto p-4 space-y-3">
      <div className="relative">
        <Ic n="search" sz={16} cls="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400" />
        <input type="text" value={q} onChange={(e) => setQ(e.target.value)}
          placeholder="제목, 단원, 개념으로 검색..."
          className="w-full pl-9 pr-3 py-2.5 bg-white border border-slate-200 rounded-xl text-sm focus:ring-2 focus:ring-indigo-500 outline-none" />
      </div>
      <div className="flex gap-2 overflow-x-auto pb-1 scrollbar-hide">
        {[
          { k: "all", l: "전체", c: problems.length },
          { k: "bookmark", l: "🔖 북마크", c: problems.filter((p) => p.bookmarked).length },
          { k: "unmastered", l: "❗ 미마스터", c: problems.filter((p) => !p.mastered).length },
          { k: "mastered", l: "✅ 마스터", c: problems.filter((p) => p.mastered).length },
          { k: "similar", l: "🎲 유사문제", c: problems.filter((p) => p.type === "similar").length },
        ].map((f) => (
          <button key={f.k} onClick={() => setFT(f.k)}
            className={"px-3 py-1.5 rounded-full text-xs font-semibold whitespace-nowrap transition-colors " + (fT === f.k ? "bg-indigo-600 text-white" : "bg-white border border-slate-200 text-slate-700 hover:bg-slate-50")}>
            {f.l}{f.c > 0 && (" (" + f.c + ")")}
          </button>
        ))}
      </div>
      <div className="flex gap-2">
        <select value={fG} onChange={(e) => setFG(e.target.value)} className="flex-1 px-3 py-2 bg-white border border-slate-200 rounded-xl text-sm">
          {grades.map((g) => <option key={g} value={g}>{g === "all" ? "모든 학년" : g}</option>)}
        </select>
        <select value={fU} onChange={(e) => setFU(e.target.value)} className="flex-1 px-3 py-2 bg-white border border-slate-200 rounded-xl text-sm">
          {units.map((u) => <option key={u} value={u}>{u === "all" ? "모든 단원" : u}</option>)}
        </select>
        <button onClick={() => setPrintMode(true)} title="출력"
          className="px-3 py-2 bg-white border border-slate-200 rounded-xl text-slate-500 hover:bg-indigo-50 hover:text-indigo-600 flex-shrink-0">
          <Ic n="print" sz={16} />
        </button>
      </div>
      {list.length === 0 ? (
        <div className="text-center py-16 text-slate-400">
          <div className="text-4xl mb-3">📚</div>
          <div className="text-sm">{problems.length === 0 ? "아직 등록된 오답이 없어요" : "조건에 맞는 문제가 없어요"}</div>
        </div>
      ) : (
        <div className="space-y-2">{list.map((p) => <Card key={p.id} p={p} onClick={() => onSelect(p)} />)}</div>
      )}
    </div>
  );
}

/* ─── 통계 ─── */
function Stats({ problems }) {
  const byUnit = useMemo(() => {
    const m = {};
    problems.forEach((p) => { if (p.unit) m[p.unit] = (m[p.unit] || 0) + 1; });
    return Object.entries(m).sort((a, b) => b[1] - a[1]);
  }, [problems]);
  const tot = problems.length;
  const mst = problems.filter((p) => p.mastered).length;
  const rev = problems.reduce((s, p) => s + (p.reviewCount || 0), 0);
  const mx = Math.max(...byUnit.map(([, c]) => c), 1);

  return (
    <div className="max-w-3xl mx-auto p-4 space-y-4">
      <h2 className="text-xl font-bold">📊 학습 현황</h2>
      <div className="grid grid-cols-2 gap-3">
        {[["전체 오답", tot, "from-indigo-500 to-indigo-600"], ["마스터", mst, "from-emerald-500 to-emerald-600"],
          ["총 복습", rev, "from-amber-500 to-amber-600"], ["마스터율", tot > 0 ? Math.round(mst / tot * 100) + "%" : "0%", "from-purple-500 to-purple-600"]
        ].map(([l, v, g]) => (
          <div key={l} className={"bg-gradient-to-br " + g + " rounded-2xl p-4 text-white"}>
            <div className="text-xs opacity-80 mb-1">{l}</div>
            <div className="text-3xl font-bold">{v}</div>
          </div>
        ))}
      </div>
      {byUnit.length > 0 && (
        <div className="bg-white rounded-2xl p-4 shadow-sm border border-slate-200">
          <div className="font-semibold mb-3">단원별 오답</div>
          <div className="space-y-2">
            {byUnit.map(([u, c]) => (
              <div key={u}>
                <div className="flex justify-between text-sm mb-1"><span>{u}</span><span className="text-slate-500">{c}개</span></div>
                <div className="h-2 bg-slate-100 rounded-full overflow-hidden">
                  <div className="h-full bg-gradient-to-r from-indigo-400 to-indigo-600 rounded-full transition-all duration-500" style={{ width: (c / mx * 100) + "%" }} />
                </div>
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

/* ─── 설정 (v2: API 키 + Firebase 설정 입력) ─── */
function Settings({ onClose, onConfigSaved }) {
  const [apiKey, setApiKey] = useState(localStorage.getItem("anthropic_api_key") || "");
  const [fbConfig, setFbConfig] = useState(localStorage.getItem("firebase_config") || "");
  const [showKey, setShowKey] = useState(false);
  const [testResult, setTestResult] = useState(null);
  const [testing, setTesting] = useState(false);
  const [saved, setSaved] = useState(false);
  // PIN 관리 상태
  const [pinMode, setPinMode] = useState("idle"); // idle | set | change | remove
  const [pinStep, setPinStep] = useState(0);
  const [pinInput, setPinInput] = useState("");
  const [pinNew, setPinNew] = useState("");
  const [pinMsg, setPinMsg] = useState(null);
  const hasPin = !!localStorage.getItem("app_pin");

  const hasApi = !!localStorage.getItem("anthropic_api_key");
  const hasFb = !!localStorage.getItem("firebase_config");

  const resetPin = () => { setPinMode("idle"); setPinStep(0); setPinInput(""); setPinNew(""); setPinMsg(null); };

  const handlePinSubmit = () => {
    const stored = localStorage.getItem("app_pin");
    if (pinMode === "set") {
      if (pinStep === 0) {
        if (pinInput.length !== 4 || !/^\d{4}$/.test(pinInput)) { setPinMsg({ ok: false, msg: "숫자 4자리를 입력하세요." }); return; }
        setPinNew(pinInput); setPinInput(""); setPinStep(1); setPinMsg(null);
      } else if (pinStep === 1) {
        if (pinInput !== pinNew) { setPinMsg({ ok: false, msg: "비밀번호가 일치하지 않습니다." }); setPinInput(""); return; }
        localStorage.setItem("app_pin", pinNew);
        setPinMsg({ ok: true, msg: "✅ 비밀번호가 설정되었습니다." });
        setTimeout(resetPin, 1500);
      }
    } else if (pinMode === "change") {
      if (pinStep === 0) {
        if (pinInput !== stored) { setPinMsg({ ok: false, msg: "현재 비밀번호가 틀렸습니다." }); setPinInput(""); return; }
        setPinInput(""); setPinStep(1); setPinMsg(null);
      } else if (pinStep === 1) {
        if (pinInput.length !== 4 || !/^\d{4}$/.test(pinInput)) { setPinMsg({ ok: false, msg: "숫자 4자리를 입력하세요." }); return; }
        setPinNew(pinInput); setPinInput(""); setPinStep(2); setPinMsg(null);
      } else if (pinStep === 2) {
        if (pinInput !== pinNew) { setPinMsg({ ok: false, msg: "비밀번호가 일치하지 않습니다." }); setPinInput(""); return; }
        localStorage.setItem("app_pin", pinNew);
        setPinMsg({ ok: true, msg: "✅ 비밀번호가 변경되었습니다." });
        setTimeout(resetPin, 1500);
      }
    } else if (pinMode === "remove") {
      if (pinInput !== stored) { setPinMsg({ ok: false, msg: "비밀번호가 틀렸습니다." }); setPinInput(""); return; }
      localStorage.removeItem("app_pin");
      sessionStorage.removeItem("pin_unlocked");
      setPinMsg({ ok: true, msg: "✅ 비밀번호가 해제되었습니다." });
      setTimeout(resetPin, 1500);
    }
  };

  const pinLabel = () => {
    if (pinMode === "set") return pinStep === 0 ? "새 비밀번호 (숫자 4자리)" : "비밀번호 확인 (다시 입력)";
    if (pinMode === "change") return pinStep === 0 ? "현재 비밀번호" : pinStep === 1 ? "새 비밀번호 (숫자 4자리)" : "새 비밀번호 확인";
    if (pinMode === "remove") return "현재 비밀번호 입력";
    return "";
  };

  const handleSave = () => {
    if (apiKey.trim()) localStorage.setItem("anthropic_api_key", apiKey.trim());
    else localStorage.removeItem("anthropic_api_key");
    if (fbConfig.trim()) {
      const cleaned = cleanFirebaseConfig(fbConfig);
      try { JSON.parse(cleaned); } catch { setTestResult({ ok: false, msg: "❌ Firebase 설정 JSON 형식이 올바르지 않습니다." }); return; }
      localStorage.setItem("firebase_config", cleaned);
      if (onConfigSaved) onConfigSaved(cleaned);
    } else {
      localStorage.removeItem("firebase_config");
    }
    setSaved(true);
    setTimeout(() => setSaved(false), 2500);
  };

  const handleTest = async () => {
    setTesting(true); setTestResult(null);
    try {
      const cfg = JSON.parse(cleanFirebaseConfig(fbConfig));
      if (firebase.apps.length) await firebase.app().delete();
      firebase.initializeApp(cfg);
      const db = firebase.firestore();
      await db.collection("science_problems").limit(1).get();
      setTestResult({ ok: true, msg: "✅ Firebase 연결 성공!" });
    } catch (e) {
      setTestResult({ ok: false, msg: "❌ 연결 실패: " + e.message });
    }
    setTesting(false);
  };

  const handleReset = () => {
    if (!confirm("모든 설정을 초기화하시겠습니까?\n(비밀번호도 해제됩니다)")) return;
    localStorage.removeItem("anthropic_api_key");
    localStorage.removeItem("firebase_config");
    localStorage.removeItem("app_pin");
    sessionStorage.removeItem("pin_unlocked");
    setApiKey(""); setFbConfig(""); setTestResult(null); resetPin();
  };

  return (
    <div className="max-w-xl mx-auto p-4 space-y-4">
      <div className="flex items-center gap-2">
        <button onClick={onClose} className="p-2 -ml-2"><Ic n="cl" /></button>
        <h2 className="text-lg font-bold">설정</h2>
      </div>

      {/* 연결 상태 */}
      <div className="bg-white rounded-2xl p-4 shadow-sm border border-slate-200 text-sm space-y-2">
        <div className="font-semibold">연결 상태</div>
        <div>API: {hasApi ? "✅ 설정됨" : "⏳ 미설정"}</div>
        <div>Firebase: {hasFb ? "✅ 설정됨" : "⏳ 미설정"}</div>
      </div>

      {/* API 키 */}
      <div className="bg-white rounded-2xl p-4 shadow-sm border border-slate-200 space-y-3">
        <div>
          <div className="font-semibold text-sm">Anthropic API 키</div>
          <div className="text-xs text-slate-500 mt-1">
            <a href="https://console.anthropic.com/settings/keys" target="_blank" rel="noopener" className="text-indigo-600 underline">console.anthropic.com</a>에서 발급
          </div>
        </div>
        <div className="flex gap-2">
          <input type={showKey ? "text" : "password"} value={apiKey}
            onChange={(e) => setApiKey(e.target.value)} placeholder="sk-ant-..."
            className="flex-1 px-3 py-2 border border-slate-300 rounded-lg text-sm font-mono focus:ring-2 focus:ring-indigo-500 outline-none" />
          <button onClick={() => setShowKey(!showKey)}
            className="px-3 py-2 bg-slate-100 rounded-lg text-xs font-semibold hover:bg-slate-200 flex-shrink-0">
            {showKey ? "숨기기" : "보기"}
          </button>
        </div>
      </div>

      {/* Firebase 설정 */}
      <div className="bg-white rounded-2xl p-4 shadow-sm border border-slate-200 space-y-3">
        <div>
          <div className="font-semibold text-sm">Firebase 설정</div>
          <div className="text-xs text-slate-500 mt-1">Firebase 콘솔 → 프로젝트 설정 → 내 앱 → firebaseConfig JSON 복사</div>
        </div>
        <textarea value={fbConfig} onChange={(e) => setFbConfig(e.target.value)}
          placeholder='{"apiKey":"AIza...","authDomain":"...firebaseapp.com","projectId":"...","storageBucket":"...","messagingSenderId":"...","appId":"..."}'
          rows={5}
          className="w-full px-3 py-2 border border-slate-300 rounded-lg text-xs font-mono focus:ring-2 focus:ring-indigo-500 outline-none" />
        <button onClick={handleTest} disabled={!fbConfig.trim() || testing}
          className="w-full py-2.5 rounded-xl bg-slate-100 hover:bg-slate-200 text-sm font-semibold disabled:opacity-50 transition-colors">
          {testing ? "⟳ 테스트 중..." : "🔍 연결 테스트"}
        </button>
        {testResult && (
          <div className={"p-3 rounded-xl text-sm font-medium " + (testResult.ok ? "bg-emerald-50 text-emerald-700 border border-emerald-200" : "bg-red-50 text-red-700 border border-red-200")}>
            {testResult.msg}
          </div>
        )}
      </div>

      {/* PIN 잠금 설정 */}
      <div className="bg-white rounded-2xl p-4 shadow-sm border border-slate-200 space-y-3">
        <div className="flex items-center justify-between">
          <div>
            <div className="font-semibold text-sm">🔒 앱 잠금</div>
            <div className="text-xs text-slate-500 mt-0.5">{hasPin ? "비밀번호가 설정되어 있습니다" : "비밀번호 미설정 (누구나 접근 가능)"}</div>
          </div>
          <span className={"text-xs font-semibold px-2 py-1 rounded-full " + (hasPin ? "bg-indigo-100 text-indigo-700" : "bg-slate-100 text-slate-500")}>
            {hasPin ? "ON" : "OFF"}
          </span>
        </div>

        {pinMode === "idle" ? (
          <div className="flex gap-2">
            {!hasPin ? (
              <button onClick={() => setPinMode("set")}
                className="flex-1 py-2 rounded-xl bg-indigo-50 hover:bg-indigo-100 text-indigo-700 text-sm font-semibold transition-colors">
                🔑 비밀번호 설정
              </button>
            ) : (
              <>
                <button onClick={() => setPinMode("change")}
                  className="flex-1 py-2 rounded-xl bg-slate-100 hover:bg-slate-200 text-slate-700 text-sm font-semibold transition-colors">
                  변경
                </button>
                <button onClick={() => setPinMode("remove")}
                  className="flex-1 py-2 rounded-xl bg-red-50 hover:bg-red-100 text-red-600 text-sm font-semibold transition-colors">
                  해제
                </button>
              </>
            )}
          </div>
        ) : (
          <div className="space-y-2">
            <label className="text-xs font-semibold text-slate-600">{pinLabel()}</label>
            <div className="flex gap-2">
              <input type="password" inputMode="numeric" maxLength={4} pattern="[0-9]*"
                value={pinInput} onChange={(e) => setPinInput(e.target.value.replace(/\D/g, "").slice(0, 4))}
                placeholder="●●●●" autoFocus
                className="flex-1 px-3 py-2.5 border border-slate-300 rounded-lg text-center text-lg tracking-[0.5em] font-mono focus:ring-2 focus:ring-indigo-500 outline-none"
                onKeyDown={(e) => { if (e.key === "Enter") handlePinSubmit(); }} />
              <button onClick={handlePinSubmit}
                className="px-4 py-2 bg-indigo-600 text-white rounded-lg text-sm font-semibold flex-shrink-0 hover:bg-indigo-700">
                확인
              </button>
              <button onClick={resetPin}
                className="px-3 py-2 bg-slate-100 rounded-lg text-sm font-semibold flex-shrink-0 hover:bg-slate-200">
                취소
              </button>
            </div>
            {pinMsg && (
              <div className={"text-xs font-medium " + (pinMsg.ok ? "text-emerald-600" : "text-red-500")}>
                {pinMsg.msg}
              </div>
            )}
          </div>
        )}
      </div>

      {/* 저장 */}
      <button onClick={handleSave}
        className={"w-full py-3.5 rounded-xl font-bold text-white shadow-lg transition-all active:scale-[0.98] " + (saved ? "bg-emerald-500" : "bg-gradient-to-r from-indigo-600 to-purple-600")}>
        {saved ? "✅ 저장 완료!" : "💾 설정 저장"}
      </button>

      {saved && (
        <div className="bg-emerald-50 border border-emerald-200 rounded-xl p-3 text-sm text-emerald-700">
          ✅ 저장되었습니다. 페이지를 새로고침하면 Firebase 연동이 활성화됩니다.
        </div>
      )}

      {/* 초기화 */}
      <button onClick={handleReset}
        className="w-full py-2 rounded-xl text-sm text-red-500 hover:bg-red-50 transition-colors">
        🗑 설정 초기화
      </button>

      {/* 안내 */}
      <div className="bg-blue-50 border border-blue-200 rounded-xl p-3 text-sm text-blue-800 space-y-1">
        <div>💡 API 키와 Firebase 설정은 <strong>이 기기의 브라우저</strong>에만 저장됩니다.</div>
        <div>📱 아이패드/아이폰 각각에서 설정이 필요합니다.</div>
        {!hasApi && !hasFb && <div>📋 설정 전에는 데모 데이터가 표시됩니다.</div>}
      </div>
    </div>
  );
}

/* ─── 앱 (v2: Firebase 동적 초기화 + Firestore CRUD) ─── */
function App() {
  const [problems, setProblems] = useState([]);
  const [view, setView] = useState("library");
  const [selected, setSelected] = useState(null);
  const [dark, setDark] = useState(false);
  const [fsize, setFsize] = useState(0);
  const [appLoading, setAppLoading] = useState(true);
  const [locked, setLocked] = useState(() => {
    const hasPin = !!localStorage.getItem("app_pin");
    const unlocked = !!sessionStorage.getItem("pin_unlocked");
    return hasPin && !unlocked;
  });
  const dbRef = useRef(null); // v2: Firestore 참조

  const go = (v) => { setSelected(null); setView(v); };
  const fsLabel = ["가", "가+", "가++"][fsize];

  /* v2: Firebase 초기화 + Firestore 데이터 로딩 */
  const initAndLoad = useCallback(async () => {
    const raw = localStorage.getItem("firebase_config");
    if (!raw) {
      // 설정 없음 → 데모 모드
      setProblems([...MOCK]);
      setAppLoading(false);
      return;
    }
    try {
      const cfg = JSON.parse(raw);
      if (!firebase.apps.length) firebase.initializeApp(cfg);
      dbRef.current = firebase.firestore();
      const snap = await dbRef.current.collection("science_problems").orderBy("createdAt", "desc").get();
      const data = snap.docs.map((d) => ({ id: d.id, ...d.data() }));
      setProblems(data);
    } catch (e) {
      console.error("Firebase init error:", e);
      setProblems([...MOCK]); // 오류 시 데모 모드
    }
    setAppLoading(false);
  }, []);

  useEffect(() => {
    initAndLoad();
    // 첫 실행 시 설정이 없으면 설정 화면으로
    const hasConfig = localStorage.getItem("firebase_config") || localStorage.getItem("anthropic_api_key");
    if (!hasConfig) setView("settings");
  }, [initAndLoad]);

  /* v2: Firestore 저장 콜백들 */
  const handleNewProblem = async (p) => {
    if (dbRef.current) {
      try { await dbRef.current.collection("science_problems").doc(p.id).set(p); } catch (e) { console.error("Save error:", e); }
    }
    setProblems((prev) => [p, ...prev]);
    setSelected(p);
    setView("detail");
  };

  /* 유사 문제 저장 (화면 전환 없이) */
  const handleSaveSilent = async (p) => {
    if (dbRef.current) {
      try { await dbRef.current.collection("science_problems").doc(p.id).set(p); } catch (e) { console.error("Save error:", e); }
    }
    setProblems((prev) => [p, ...prev]);
  };

  const handleUpdate = async (u) => {
    if (dbRef.current) {
      try { await dbRef.current.collection("science_problems").doc(u.id).set(u); } catch (e) { console.error("Update error:", e); }
    }
    setProblems((prev) => prev.map((p) => p.id === u.id ? u : p));
    setSelected(u);
  };

  const handleDelete = async (id) => {
    if (dbRef.current) {
      try { await dbRef.current.collection("science_problems").doc(id).delete(); } catch (e) { console.error("Delete error:", e); }
    }
    setProblems((prev) => prev.filter((p) => p.id !== id));
    go("library");
  };

  const handleReload = async () => {
    if (dbRef.current) {
      try {
        const snap = await dbRef.current.collection("science_problems").orderBy("createdAt", "desc").get();
        setProblems(snap.docs.map((d) => ({ id: d.id, ...d.data() })));
      } catch (e) { console.error("Reload error:", e); }
    } else {
      setProblems([...MOCK]);
    }
    go("library");
  };

  const handleConfigSaved = async (configStr) => {
    try {
      const cfg = JSON.parse(configStr);
      // 기존 앱이 있으면 삭제 후 재초기화
      if (firebase.apps.length) {
        await firebase.app().delete();
      }
      firebase.initializeApp(cfg);
      dbRef.current = firebase.firestore();
      const snap = await dbRef.current.collection("science_problems").orderBy("createdAt", "desc").get();
      setProblems(snap.docs.map((d) => ({ id: d.id, ...d.data() })));
    } catch (e) { console.error("Config apply error:", e); }
  };

  if (locked) {
    return <PinLock onUnlock={() => setLocked(false)} />;
  }

  if (appLoading) {
    return (
      <div className="min-h-screen bg-slate-50 flex items-center justify-center">
        <div className="text-center">
          <div className="text-4xl mb-3 animate-pulse">🔬</div>
          <div className="text-sm text-slate-500">로딩 중...</div>
        </div>
      </div>
    );
  }

  return (
    <div className={"min-h-screen bg-slate-50 pb-20 " + (dark ? "dm " : "") + (fsize === 1 ? "fs1" : fsize === 2 ? "fs2" : "")}
      style={{ fontFamily: "-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" }}>
      <style>{`
        @keyframes fadeInUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
        .line-clamp-2{display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
        .scrollbar-hide::-webkit-scrollbar{display:none}
        .scrollbar-hide{-ms-overflow-style:none;scrollbar-width:none}
        .fs1{zoom:1.15}
        .fs2{zoom:1.3}
        .dm{background:#0f172a!important;color:#cbd5e1}
        .dm .bg-slate-50{background:#0f172a!important}
        .dm .bg-white{background:#1e293b!important}
        .dm header,.dm nav{background:#0f172a!important;border-color:#1e293b!important}
        .dm .bg-slate-100{background:#334155!important}
        .dm [class*="border-slate"]{border-color:#334155!important}
        .dm [class*="shadow-sm"]{box-shadow:0 0 12px rgba(0,240,255,.08)!important}
        .dm .text-slate-800{color:#00f0ff!important;text-shadow:0 0 8px rgba(0,240,255,.4)}
        .dm .text-slate-700{color:#e2e8f0!important}
        .dm .text-slate-600{color:#94a3b8!important}
        .dm .text-slate-500,.dm .text-slate-400{color:#64748b!important}
        .dm .text-3xl{color:#39ff14!important;text-shadow:0 0 12px rgba(57,255,20,.5)}
        .dm .text-xl{color:#00f0ff!important;text-shadow:0 0 10px rgba(0,240,255,.5)}
        .dm input,.dm select,.dm textarea{background:#334155!important;color:#e2e8f0!important;border-color:#475569!important}
        .dm .group\\:hover h3,.dm .group:hover h3{color:#39ff14!important}
        .dm [class*="bg-indigo-100"]{background:rgba(99,102,241,.2)!important;color:#818cf8!important}
        .dm [class*="bg-purple-100"]{background:rgba(168,85,247,.2)!important;color:#c084fc!important}
        .dm [class*="bg-amber-100"]{background:rgba(245,158,11,.2)!important;color:#fbbf24!important}
        .dm [class*="bg-emerald-100"]{background:rgba(16,185,129,.2)!important;color:#34d399!important}
        .dm [class*="bg-red-100"]{background:rgba(239,68,68,.2)!important;color:#f87171!important}
        .dm .bg-red-50{background:rgba(239,68,68,.15)!important}
        .dm .bg-indigo-50{background:rgba(99,102,241,.15)!important}
        .dm .bg-indigo-200{background:rgba(99,102,241,.3)!important}
        .dm .bg-blue-50{background:rgba(59,130,246,.15)!important}
        .dm .text-indigo-700,.dm .text-indigo-800{color:#818cf8!important}
        .dm .text-indigo-900,.dm .formula-text{color:#a5b4fc!important;text-shadow:0 0 6px rgba(165,180,252,.4)}
        .dm .text-red-800,.dm .text-red-700{color:#f87171!important;text-shadow:0 0 6px rgba(248,113,113,.3)}
        .dm .text-red-600{color:#fb7185!important}
        .dm .text-red-500{color:#f87171!important}
        .dm .text-amber-900,.dm .text-amber-800{color:#fbbf24!important}
        .dm .bg-amber-400{background:#78350f!important;color:#fbbf24!important}
        .dm .text-emerald-600,.dm .text-emerald-700{color:#34d399!important}
        .dm .text-purple-500,.dm .text-purple-600,.dm .text-purple-700{color:#c084fc!important}
        .dm .text-blue-800{color:#93c5fd!important}
        .dm [class*="from-amber-50"]{background:rgba(245,158,11,.1)!important}
        .dm [class*="from-indigo-50"]{background:rgba(99,102,241,.1)!important}
        .dm [class*="border-amber"]{border-color:rgba(245,158,11,.3)!important}
        .dm [class*="border-indigo"]{border-color:rgba(99,102,241,.3)!important}
        .dm [class*="border-blue"]{border-color:rgba(59,130,246,.3)!important}
        .dm [class*="border-red"]{border-color:rgba(239,68,68,.3)!important}
        .dm .math-text{background:#1e293b!important;color:#e2e8f0!important;border:1px solid #334155}
        .dm .font-bold{color:#00f0ff!important;text-shadow:0 0 8px rgba(0,240,255,.3)}
        .dm .font-bold.text-white{color:#fff!important;text-shadow:none}
        .dm .font-semibold.text-white{color:#fff!important}
        @media print{
          .np,.no-print{display:none!important}
          nav{display:none!important}
          header{display:none!important}
          .fs1,.fs2{zoom:1!important}
          button{display:none!important}
          textarea{display:none!important}
          .animate-spin,.animate-pulse{animation:none!important}
          body,.min-h-screen{padding-bottom:0!important}
          @page{margin:15mm 10mm}
          .print-area,.print-area *{color-adjust:exact!important;-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important}
          .print-area{background:#fff!important;color:#1e293b!important}
          .print-area img:not(.max-h-72){max-height:none!important;max-width:100%!important}
          .dm{background:#f8fafc!important;color:#334155!important}
          .dm *{text-shadow:none!important;box-shadow:none!important}
          .dm .bg-slate-50{background:#f8fafc!important}
          .dm .bg-white{background:#fff!important}
          .dm .bg-slate-100{background:#f1f5f9!important}
          .dm .text-slate-800{color:#1e293b!important}
          .dm .text-slate-700{color:#334155!important}
          .dm .text-slate-600{color:#475569!important}
          .dm .text-slate-500,.dm .text-slate-400{color:#64748b!important}
          .dm .text-3xl{color:#1e293b!important}
          .dm .text-xl{color:#1e293b!important}
          .dm .font-bold{color:#1e293b!important}
          .dm .text-indigo-700,.dm .text-indigo-800{color:#4338ca!important}
          .dm .text-indigo-900,.dm .formula-text{color:#312e81!important}
          .dm .bg-indigo-50{background:#eef2ff!important}
          .dm .bg-indigo-200{background:#c7d2fe!important}
          .dm [class*="bg-indigo-100"]{background:#e0e7ff!important;color:#4338ca!important}
          .dm [class*="border-indigo"]{border-color:#a5b4fc!important}
          .dm .text-red-800,.dm .text-red-700{color:#991b1b!important}
          .dm .text-red-600,.dm .text-red-500{color:#dc2626!important}
          .dm .bg-red-50{background:#fef2f2!important}
          .dm [class*="bg-red-100"]{background:#fee2e2!important;color:#991b1b!important}
          .dm .text-emerald-600,.dm .text-emerald-700{color:#059669!important}
          .dm [class*="bg-emerald-100"]{background:#d1fae5!important;color:#065f46!important}
          .dm .text-amber-900,.dm .text-amber-800{color:#92400e!important}
          .dm [class*="bg-amber-100"]{background:#fef3c7!important;color:#92400e!important}
          .dm .text-purple-500,.dm .text-purple-600,.dm .text-purple-700{color:#7c3aed!important}
          .dm [class*="bg-purple-100"]{background:#f3e8ff!important;color:#6b21a8!important}
          .dm .text-blue-800{color:#1e40af!important}
          .dm .bg-blue-50{background:#eff6ff!important}
          .dm [class*="from-amber-50"]{background:#fffbeb!important}
          .dm [class*="from-indigo-50"]{background:#eef2ff!important}
          .dm [class*="border-slate"]{border-color:#e2e8f0!important}
          .dm [class*="border-amber"]{border-color:#fde68a!important}
          .dm [class*="border-blue"]{border-color:#bfdbfe!important}
          .dm [class*="border-red"]{border-color:#fecaca!important}
          .dm .math-text{background:#f8fafc!important;color:#1e293b!important;border-color:#e2e8f0!important}
          .dm input,.dm select,.dm textarea{background:#fff!important;color:#1e293b!important;border-color:#cbd5e1!important}
        }
      `}</style>

      <header className="bg-white border-b border-slate-200 sticky top-0 z-30">
        <div className="max-w-3xl mx-auto px-4 py-3 flex items-center justify-between">
          <div className="flex items-center gap-2">
            <div className="w-8 h-8 rounded-lg bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center text-lg">🔬</div>
            <h1 className="font-bold text-slate-800 text-sm">HW 과학 오답노트 byYHS</h1>
          </div>
          <div className="flex items-center gap-1">
            <button onClick={() => setFsize((n) => (n + 1) % 3)} title="글자 크기 조절"
              className={"px-2 py-1.5 rounded-lg text-xs font-bold " + (dark ? "hover:bg-slate-700 text-slate-300" : "hover:bg-slate-100 text-slate-600")}>
              <span className={fsize > 0 ? (dark ? "text-cyan-400" : "text-indigo-600") : ""}>{fsLabel}</span>
            </button>
            <button onClick={() => setDark(!dark)} title={dark ? "라이트 모드" : "다크 모드"}
              className={"p-2 rounded-lg text-lg " + (dark ? "hover:bg-slate-700" : "hover:bg-slate-100")}>
              {dark ? "☀️" : "🌙"}
            </button>
            <button onClick={handleReload} title="새로고침"
              className={"p-2 rounded-lg " + (dark ? "hover:bg-slate-700 text-slate-400" : "hover:bg-slate-100 text-slate-500")}>
              <Ic n="rld" sz={16} />
            </button>
            <button onClick={() => setView("settings")} title="설정"
              className={"p-2 rounded-lg " + (dark ? "hover:bg-slate-700 text-slate-400" : "hover:bg-slate-100 text-slate-500")}>
              <Ic n="cog" sz={18} />
            </button>
          </div>
        </div>
      </header>

      <main>
        {view === "library" && <Library problems={problems} onSelect={(p) => { setSelected(p); setView("detail"); }} />}
        {view === "upload" && <UploadView onSave={handleNewProblem} onCancel={() => setView("library")} />}
        {view === "stats" && <Stats problems={problems} />}
        {view === "settings" && <Settings onClose={() => go("library")} onConfigSaved={handleConfigSaved} />}
        {view === "detail" && selected && (
          <Detail problem={selected} onClose={() => go("library")} onUpdate={handleUpdate} onDelete={handleDelete} onSaveSilent={handleSaveSilent} />
        )}
      </main>

      <nav className="fixed bottom-0 left-0 right-0 bg-white border-t border-slate-200 z-30 no-print">
        <div className="max-w-3xl mx-auto grid grid-cols-3 relative">
          <button onClick={() => go("library")} className={"py-3 flex flex-col items-center gap-0.5 transition-colors " + (view === "library" ? "text-indigo-600" : "text-slate-500")}>
            <Ic n="home" sz={20} /><span className="text-[10px] font-semibold">라이브러리</span>
          </button>
          <button onClick={() => setView("upload")} className="py-3 flex flex-col items-center gap-0.5">
            <div className="w-12 h-12 -mt-5 rounded-full bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center text-white shadow-lg active:scale-95 transition-transform">
              <Ic n="plus" sz={22} cls="text-white" />
            </div>
            <span className={"text-[10px] font-semibold " + (view === "upload" ? "text-indigo-600" : "text-slate-500")}>새 문제</span>
          </button>
          <button onClick={() => go("stats")} className={"py-3 flex flex-col items-center gap-0.5 transition-colors " + (view === "stats" ? "text-indigo-600" : "text-slate-500")}>
            <Ic n="bar" sz={20} /><span className="text-[10px] font-semibold">통계</span>
          </button>
        </div>
      </nav>
    </div>
  );
}

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(React.createElement(App));
  </script>
</body>
</html>
